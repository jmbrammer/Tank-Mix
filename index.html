<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tank Mix Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 16px;
  }

  h2, h3 {
    margin-top: 20px;
    margin-bottom: 8px;
  }

  .row {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
  }

  .box {
    flex: 1;
  }

  input, select, button {
    width: 100%;
    padding: 8px;
    font-size: 16px;
  }

  button {
    cursor: pointer;
    font-weight: bold;
  }

  .readonly {
    background-color: #f3f3f3;
  }

  /* ---------------- DESKTOP / TABLET TABLE ---------------- */

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
  }

  thead th {
    background-color: #e5e5e5;
    font-weight: bold;
    padding: 10px 6px;
    border: 1px solid #bbb;
  }

  tbody td {
    border: 1px solid #ccc;
    padding: 10px 6px;
    vertical-align: middle;
    text-align: center;
  }

  tbody tr:nth-child(odd) { background-color: #fafafa; }
  tbody tr:nth-child(even) { background-color: #f0f0f0; }

  tbody tr:hover { background-color: #e8f4ff; }

  .output {
    font-weight: bold;
  }

  /* Column widths */
  th:nth-child(1), td:nth-child(1) { width: 20%; }
  th:nth-child(2), td:nth-child(2) { width: 10%; }
  th:nth-child(3), td:nth-child(3) { width: 10%; }
  th:nth-child(4), td:nth-child(4) { width: 14%; }
  th:nth-child(5), td:nth-child(5) { width: 12%; }
  th:nth-child(6), td:nth-child(6) { width: 14%; }
  th:nth-child(7), td:nth-child(7) { width: 20%; }

  /* ---------------- iPHONE NARROW LAYOUT ---------------- */

  @media (max-width: 480px) {

    .row {
      flex-direction: column;
    }

    table, thead, tbody, th, td, tr {
      display: block;
      width: 100%;
    }

    thead {
      display: none;
    }

    tbody tr {
      background: #ffffff;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 12px;
      padding: 10px;
    }

    tbody td {
      border: none;
      text-align: left;
      padding: 6px 0;
    }

    tbody td::before {
      font-weight: bold;
      display: block;
      margin-bottom: 2px;
    }

    tbody td:nth-child(1)::before { content: "Name"; }
    tbody td:nth-child(2)::before { content: "Rate"; }
    tbody td:nth-child(3)::before { content: "Unit"; }
    tbody td:nth-child(4)::before { content: "Basis"; }
    tbody td:nth-child(5)::before { content: "Jug"; }
    tbody td:nth-child(6)::before { content: "Amount"; }
    tbody td:nth-child(7)::before { content: "Breakdown"; }

    tbody tr:hover {
      background-color: #ffffff;
    }
  }
</style>
</head>

<body>

<h2>Tank Mix Calculator</h2>

<!-- PRIMARY INPUT ROW -->
<div class="row">
  <div class="box">
    <label>GPA</label>
    <input id="gpa" type="number" step="0.01">
  </div>

  <div class="box">
    <label>Acres</label>
    <input id="acres" type="number" step="0.01">
  </div>

  <div class="box">
    <label>Gallons to Load</label>
    <input id="gallons" type="number" step="0.01">
  </div>
</div>

<!-- DERIVED ROW -->
<div class="row">
  <div class="box">
    <label>Gallons of Mix</label>
    <input id="mixGallons" class="readonly" disabled>
  </div>

  <div class="box">
    <label>Derived Acres</label>
    <input id="derivedAcres" class="readonly" disabled>
  </div>
</div>

<div>
