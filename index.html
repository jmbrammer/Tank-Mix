<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tank Mix Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body { font-family: Arial, sans-serif; padding: 16px; }
  h2, h3 { margin: 20px 0 8px; }

  .row { display: flex; gap: 16px; margin-bottom: 12px; }
  .box { flex: 1; }

  input, select, button {
    width: 100%;
    padding: 8px;
    font-size: 16px;
  }

  button { font-weight: bold; cursor: pointer; }
  .readonly { background: #f3f3f3; }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
  }

  thead th {
    background: #e5e5e5;
    border: 1px solid #bbb;
    padding: 10px 6px;
  }

  tbody td {
    border: 1px solid #ccc;
    padding: 10px 6px;
    text-align: center;
  }

  tbody tr:nth-child(odd) { background: #fafafa; }
  tbody tr:nth-child(even) { background: #f0f0f0; }
</style>
</head>

<body>

<h2>Tank Mix Calculator</h2>

<div class="row">
  <div class="box">
    <label>Acres to Mix</label>
    <input id="acres">
  </div>
  <div class="box">
    <label>Gallons to Load</label>
    <input id="gallons">
  </div>
  <div class="box">
    <label>GPA</label>
    <input id="gpa">
  </div>
</div>

<div class="row">
  <div class="box">
    <label>Gallons to Mix</label>
    <input id="mixGallons" class="readonly" disabled>
  </div>
  <div class="box">
    <label>Acres to Load</label>
    <input id="derivedAcres" class="readonly" disabled>
  </div>
</div>

<div><strong>Mode:</strong> <span id="mode"></span></div>

<h3>Ingredients</h3>

<table>
  <thead>
    <tr>
      <th>Name</th><th>Rate</th><th>Unit</th><th>Basis</th>
      <th>Jug</th><th>Amount</th><th>Breakdown</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<div class="row">
  <div class="box"><button onclick="addRow()">Add Ingredient</button></div>
  <div class="box"><button onclick="removeLastRow()">Remove Last</button></div>
</div>

<div class="row">
  <div class="box"><button id="autoBtn" onclick="toggleAutoRecalc()">Auto‑Recalculate: ON</button></div>
</div>

<h3>Import Mixes (Excel / Google Sheets)</h3>
<input type="file" accept=".xlsx" onchange="importExcelFile(this.files[0])">

<h3>Saved Mixes</h3>

<select id="mixSelect"></select>

<div class="row">
  <div class="box">
    <label>Mix Name</label>
    <input id="mixName" placeholder="Enter mix name">
  </div>
</div>

<div class="row">
  <div class="box">
    <button onclick="newMix()">New Mix</button>
  </div>
  <div class="box">
    <button onclick="saveCurrentMix()">Save / Update Mix</button>
  </div>
  <div class="box">
    <button onclick="deleteMix()">Delete Mix</button>
  </div>
</div>


<!-- XLSX library (must load first) -->
https://unpkg.com/xlsx/dist/xlsx.full.min.js</script>

<!-- App logic -->
<script src="app.js"></script>

<!-- service worker temporarily disabled during dev -->

if ("serviceWorker" in navigator) {

}
</script>
-->
</body>
</html>
