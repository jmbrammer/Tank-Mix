<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tank Mix Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body { font-family: Arial, sans-serif; padding: 16px; }
  .row { display: flex; gap: 16px; margin-bottom: 12px; }
  .box { flex: 1; }
  input, select, button { width: 100%; padding: 6px; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
  .output { font-weight: bold; }
  .readonly { background: #f0f0f0; }
</style>
</head>

<body>

<h2>Tank Mix Calculator</h2>

<!-- INPUTS -->
<div class="row">
  <div class="box">
    <label>GPA</label>
    <input id="gpa" type="number" step="0.01">
  </div>
</div>

<div class="row">
  <div class="box">
    <label>Acres</label>
    <input id="acres" type="number" step="0.01">
  </div>
  <div class="box">
    <label>Gallons of Mix</label>
    <input id="mixGallons" class="readonly" disabled>
  </div>
</div>

<div class="row">
  <div class="box">
    <label>Gallons Sprayed</label>
    <input id="gallons" type="number" step="0.01">
  </div>
  <div class="box">
    <label>Derived Acres</label>
    <input id="derivedAcres" class="readonly" disabled>
  </div>
</div>

<div>
  <strong>Mode:</strong> <span id="mode"></span>
</div>

<!-- AUTO RECALC -->
<div style="margin:12px 0;">
  <button id="autoBtn" onclick="toggleAutoRecalc()">Auto‑Recalculate: ON</button>
</div>

<!-- INGREDIENTS -->
<h3>Ingredients</h3>
<table>
<thead>
<tr>
  <th>Name</th>
  <th>Rate</th>
  <th>Unit</th>
  <th>Basis</th>
  <th>Jug</th>
  <th>Amount</th>
  <th>Breakdown</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button onclick="addRow()">Add Ingredient</button>

<!-- MIX MANAGEMENT -->
<h3>Saved Mixes</h3>
<div class="row">
  <div class="box">
    <select id="mixSelect"></select>
  </div>
  <div class="box">
    <input id="mixName" placeholder="New mix name">
  </div>
</div>

<div class="row">
  <div class="box"><button onclick="saveMix()">Save / Update</button></div>
  <div class="box"><button onclick="deleteMix()">Delete</button></div>
</div>

<!-- EXCEL -->
<h3>Excel Import / Export</h3>
<div class="row">
  <div class="box"><button onclick="exportCSV()">Export CSV</button></div>
  <div class="box">
    <input type="file" accept=".csv" onchange="importCSV(event)">
  </div>
</div>

<script src="app.js"></script>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
