<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tank Mix Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body { font-family: Arial, sans-serif; padding: 16px; }
  h2, h3 { margin: 20px 0 8px; }

  .row {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
  }

  .box { flex: 1; }

  input, select, button {
    width: 100%;
    padding: 8px;
    font-size: 16px;
  }

  button { font-weight: bold; cursor: pointer; }

  .readonly { background: #f3f3f3; }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
  }

  thead th {
    background: #e5e5e5;
    border: 1px solid #bbb;
    padding: 10px 6px;
  }

  tbody td {
    border: 1px solid #ccc;
    padding: 10px 6px;
    text-align: center;
  }

  tbody tr:nth-child(odd) { background: #fafafa; }
  tbody tr:nth-child(even) { background: #f0f0f0; }

  tbody tr:hover { background: #e8f4ff; }

  .output { font-weight: bold; }

  @media (max-width: 480px) {
    .row { flex-direction: column; }

    table, thead, tbody, th, td, tr {
      display: block;
      width: 100%;
    }

    thead { display: none; }

    tbody tr {
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 12px;
      padding: 10px;
      background: white;
    }

    tbody td {
      border: none;
      text-align: left;
      padding: 6px 0;
    }

    tbody td::before {
      font-weight: bold;
      display: block;
    }

    tbody td:nth-child(1)::before { content: "Name"; }
    tbody td:nth-child(2)::before { content: "Rate"; }
    tbody td:nth-child(3)::before { content: "Unit"; }
    tbody td:nth-child(4)::before { content: "Basis"; }
    tbody td:nth-child(5)::before { content: "Jug"; }
    tbody td:nth-child(6)::before { content: "Amount"; }
    tbody td:nth-child(7)::before { content: "Breakdown"; }
  }
</style>
</head>

<body>

<h2>Tank Mix Calculator</h2>

<div class="row">
  <div class="box">
    <label>GPA</label>
    <input id="gpa" type="number" step="0.01">
  </div>
  <div class="box">
    <label>Acres to Mix</label>
    <input id="acres" type="number" step="0.01">
  </div>
  <div class="box">
    <label>Gallons to Load</label>
    <input id="gallons" type="number" step="0.01">
  </div>
</div>

<div class="row">
  <div class="box">
    <label>Gallons to Mix</label>
    <input id="mixGallons" class="readonly" disabled>
  </div>
  <div class="box">
    <label>Acres to Load</label>
    <input id="derivedAcres" class="readonly" disabled>
  </div>
  <div class="box"></div>
</div>

<div><strong>Mode:</strong> <span id="mode"></span></div>

<h3>Ingredients</h3>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Rate</th>
      <th>Unit</th>
      <th>Basis</th>
      <th>Jug</th>
      <th>Amount</th>
      <th>Breakdown</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<button onclick="addRow()">Add Ingredient</button>

<div style="margin:16px 0;">
  <button id="autoBtn" onclick="toggleAutoRecalc()">Auto‑Recalculate: ON</button>
</div>

<h3>Saved Mixes</h3>

<div class="row">
  <div class="box"><select id="mixSelect"></select></div>
  <div class="box"><input id="mixName" placeholder="New mix name"></div>
  <div class="box"></div>
</div>

<div class="row">
  <div class="box"><button onclick="saveMix()">Save / Update</button></div>
  <div class="box"><button onclick="deleteMix()">Delete</button></div>
  <div class="box"></div>
</div>

<h3>Excel Import / Export</h3>

<div class="row">
  <div class="box"><button onclick="exportCSV()">Export CSV</button></div>
  <div class="box"><input type="file" accept=".csv" onchange="importCSV(event)"></div>
  <div class="box"></div>
</div>

<!-- ✅ THIS IS THE IMPORTANT LINE -->
<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
